<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Shape Sudoku Hack</title>
<style>
  :root{--bg:#4f4f4f;--cell:#777;--cell2:#707070;--white:#f5f5f5;--green:#47d16c;--red:#ff4b4b;--locked:#3f3f3f;}
  *{ box-sizing:border-box; }
  body{margin:0;min-height:100vh;background:radial-gradient(circle at top, rgba(255,255,255,.08), transparent 35%), var(--bg);color:var(--white);font-family:Arial, Helvetica, sans-serif;display:flex;align-items:center;justify-content:center;padding:20px;overflow:hidden;}
  .game{width:min(560px, 96vw);background:rgba(35,35,35,.35);border:1px solid rgba(255,255,255,.16);border-radius:18px;box-shadow:0 20px 60px rgba(0,0,0,.35);padding:22px;text-align:center;position:relative;}
  h1{margin:0;letter-spacing:3px;font-size:28px;}
  .subtitle{margin:8px 0 16px;opacity:.9;font-size:14px;}
  .topbar{display:flex;align-items:center;justify-content:space-between;gap:12px;margin:14px 0 18px;}
  .timer-wrap{flex:1;height:16px;background:#2d2d2d;border-radius:999px;overflow:hidden;border:1px solid rgba(255,255,255,.18);}
  #timerBar{width:100%;height:100%;background:var(--white);transition:width .2s linear;}
  #timeText{width:70px;font-weight:bold;}
  .board{display:grid;grid-template-columns:repeat(4, 88px);grid-template-rows:repeat(4, 88px);justify-content:center;margin:0 auto 18px;background:var(--white);border:5px solid var(--white);border-radius:14px;width:max-content;overflow:hidden;}
  .cell{width:88px;height:88px;background:var(--cell);border:1px solid rgba(255,255,255,.8);display:flex;align-items:center;justify-content:center;color:var(--white);font-size:42px;font-weight:bold;cursor:pointer;user-select:none;transition:transform .08s ease, background .15s ease, color .15s ease;}
  .cell:nth-child(even){ background:var(--cell2); }
  .cell:nth-child(2),.cell:nth-child(6),.cell:nth-child(10),.cell:nth-child(14){border-right:5px solid var(--white);}
  .cell:nth-child(5),.cell:nth-child(6),.cell:nth-child(7),.cell:nth-child(8){border-bottom:5px solid var(--white);}
  .cell:hover:not(.locked){transform:scale(1.035);z-index:2;border-color:rgba(255,255,255,1);}
  .cell.locked{background:var(--locked);cursor:not-allowed;box-shadow:inset 0 0 0 2px rgba(255,255,255,.30);}
  .cell.correct{background:rgba(71,209,108,.28);color:var(--green);border-color:var(--green);}
  .cell.wrong{background:rgba(255,75,75,.20);color:var(--red);border-color:var(--red);}
  .buttons{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;}
  button{border:0;border-radius:10px;padding:11px 16px;font-weight:bold;cursor:pointer;background:var(--white);color:#222;box-shadow:0 8px 20px rgba(0,0,0,.22);}
  button:hover{ transform:translateY(-1px); }
  #message{min-height:28px;margin:14px 0 0;font-size:19px;font-weight:bold;}
  #solutionBox{display:none;margin-top:14px;background:rgba(0,0,0,.25);border:1px solid rgba(255,255,255,.18);border-radius:12px;padding:12px;}
  .solution-title{margin-bottom:8px;font-weight:bold;}
  .mini-board{display:grid;grid-template-columns:repeat(4, 44px);gap:4px;justify-content:center;}
  .mini-cell{width:44px;height:44px;border-radius:7px;background:#777;display:flex;align-items:center;justify-content:center;color:white;font-size:23px;font-weight:bold;}
  .truck-scene{pointer-events:none;position:fixed;left:0;right:0;bottom:20px;height:130px;display:none;overflow:hidden;}
  .truck-scene.active{ display:block; }
  .truck{position:absolute;bottom:18px;left:-230px;font-size:82px;animation:driveIn 2.5s ease-out forwards;}
  .money{position:absolute;bottom:78px;left:50%;transform:translateX(-50%);font-size:30px;opacity:0;animation:cashDrop 1.4s ease-in-out 1.8s forwards;}
  @keyframes driveIn{0%{ left:-230px; }72%{ left:43%; }100%{ left:43%; }}
  @keyframes cashDrop{0%{ opacity:0; transform:translate(-50%, -30px) scale(.7); }25%{ opacity:1; }100%{ opacity:1; transform:translate(-50%, 45px) scale(1.25); }}
  @media(max-width:460px){.board{grid-template-columns:repeat(4, 70px);grid-template-rows:repeat(4, 70px);}.cell{width:70px;height:70px;font-size:35px;}}
</style>
</head>
<body>
  <main class="game">
    <h1>SHAPE SUDOKU</h1>
    <p class="subtitle">Click order: ● circle → — line → ▲ triangle → ■ square</p>
    <div class="topbar"><div class="timer-wrap"><div id="timerBar"></div></div><div id="timeText">35s</div></div>
    <div id="board" class="board"></div>
    <div class="buttons"><button id="validateBtn">Validate</button><button id="solveBtn">Solve</button><button id="newBtn">New Puzzle</button></div>
    <p id="message"></p>
    <div id="solutionBox"><div class="solution-title">One valid solution:</div><div id="solutionBoard" class="mini-board"></div></div>
  </main>
  <div id="truckScene" class="truck-scene"><div class="truck">🚚</div><div class="money">💵💵💵💵💵<br>CONGRATS!</div></div>
<script>
const SHAPES=["circle","line","triangle","square"];
const SYMBOLS={circle:"●",line:"—",triangle:"▲",square:"■"};
const SIZE=4, BOX=2, STARTING_CLUES=4, TOTAL_TIME=35;
const boardEl=document.getElementById("board"), messageEl=document.getElementById("message"), solutionBox=document.getElementById("solutionBox"), solutionBoard=document.getElementById("solutionBoard"), timerBar=document.getElementById("timerBar"), timeText=document.getElementById("timeText"), truckScene=document.getElementById("truckScene");
let solution=[], puzzle=[], timer=null, timeLeft=TOTAL_TIME, gameOver=false;
function shuffle(arr){const copy=[...arr];for(let i=copy.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[copy[i],copy[j]]=[copy[j],copy[i]];}return copy;}
function pattern(r,c){return (BOX*(r%BOX)+Math.floor(r/BOX)+c)%SIZE;}
function generateSolvedBoard(){const rows=shuffle([0,1]).flatMap(g=>shuffle([0,1]).map(r=>g*BOX+r));const cols=shuffle([0,1]).flatMap(g=>shuffle([0,1]).map(c=>g*BOX+c));const nums=shuffle(SHAPES);return rows.map(r=>cols.map(c=>nums[pattern(r,c)]));}
function makePuzzle(){solution=generateSolvedBoard();puzzle=Array.from({length:SIZE},()=>Array(SIZE).fill(""));const positions=shuffle([...Array(16).keys()]).slice(0,STARTING_CLUES);positions.forEach(pos=>{const r=Math.floor(pos/SIZE), c=pos%SIZE;puzzle[r][c]=solution[r][c];});}
function renderBoard(){boardEl.innerHTML="";messageEl.textContent="";solutionBox.style.display="none";truckScene.classList.remove("active");gameOver=false;for(let r=0;r<SIZE;r++){for(let c=0;c<SIZE;c++){const cell=document.createElement("div");cell.className="cell";cell.dataset.r=r;cell.dataset.c=c;cell.dataset.shape="";cell.dataset.clickIndex="-1";if(puzzle[r][c]){cell.classList.add("locked");cell.dataset.shape=puzzle[r][c];cell.textContent=SYMBOLS[puzzle[r][c]];}else{cell.addEventListener("click",()=>cycleCell(cell));}boardEl.appendChild(cell);}}}
function cycleCell(cell){if(gameOver||cell.classList.contains("locked"))return;cell.classList.remove("correct","wrong");let idx=Number(cell.dataset.clickIndex);idx++;if(idx>=SHAPES.length){idx=-1;cell.dataset.shape="";cell.textContent="";}else{const shape=SHAPES[idx];cell.dataset.shape=shape;cell.textContent=SYMBOLS[shape];}cell.dataset.clickIndex=String(idx);messageEl.textContent="";}
function readBoard(){const cells=[...document.querySelectorAll(".cell")];const board=Array.from({length:SIZE},()=>Array(SIZE).fill(""));cells.forEach(cell=>{const r=Number(cell.dataset.r), c=Number(cell.dataset.c);board[r][c]=cell.dataset.shape||"";});return board;}
function validGroup(group){return group.length===4&&!group.includes("")&&new Set(group).size===4;}
function isCompleteValidSudoku(board){for(let r=0;r<SIZE;r++){if(!validGroup(board[r]))return false;}for(let c=0;c<SIZE;c++){const col=[board[0][c],board[1][c],board[2][c],board[3][c]];if(!validGroup(col))return false;}for(let br=0;br<SIZE;br+=BOX){for(let bc=0;bc<SIZE;bc+=BOX){const box=[board[br][bc],board[br][bc+1],board[br+1][bc],board[br+1][bc+1]];if(!validGroup(box))return false;}}return true;}
function shapeConflicts(board,r,c,shape){for(let i=0;i<SIZE;i++){if(i!==c&&board[r][i]===shape)return true;if(i!==r&&board[i][c]===shape)return true;}const br=Math.floor(r/BOX)*BOX, bc=Math.floor(c/BOX)*BOX;for(let rr=br;rr<br+BOX;rr++){for(let cc=bc;cc<bc+BOX;cc++){if((rr!==r||cc!==c)&&board[rr][cc]===shape)return true;}}return false;}
function validate(){if(gameOver)return;const board=readBoard();const cells=[...document.querySelectorAll(".cell")];cells.forEach(cell=>cell.classList.remove("correct","wrong"));cells.forEach(cell=>{if(cell.classList.contains("locked"))return;const r=Number(cell.dataset.r), c=Number(cell.dataset.c), shape=cell.dataset.shape;if(!shape||shapeConflicts(board,r,c,shape)){cell.classList.add("wrong");}else{cell.classList.add("correct");}});if(isCompleteValidSudoku(board)){win();}else{messageEl.textContent="Not solved yet ❌";}}
function win(){gameOver=true;clearInterval(timer);messageEl.textContent="Valid Solution ✅";truckScene.classList.add("active");}
function renderSolution(){solutionBoard.innerHTML="";for(let r=0;r<SIZE;r++){for(let c=0;c<SIZE;c++){const mini=document.createElement("div");mini.className="mini-cell";mini.textContent=SYMBOLS[solution[r][c]];solutionBoard.appendChild(mini);}}solutionBox.style.display="block";}
function startTimer(){clearInterval(timer);timeLeft=TOTAL_TIME;updateTimer();timer=setInterval(()=>{if(gameOver)return;timeLeft--;updateTimer();if(timeLeft<=0){gameOver=true;clearInterval(timer);messageEl.textContent="Time's up ⏱️";}},1000);}
function updateTimer(){timeText.textContent=timeLeft+"s";timerBar.style.width=Math.max(0,(timeLeft/TOTAL_TIME)*100)+"%";}
function newGame(){makePuzzle();renderBoard();startTimer();}
document.getElementById("validateBtn").addEventListener("click",validate);document.getElementById("solveBtn").addEventListener("click",renderSolution);document.getElementById("newBtn").addEventListener("click",newGame);newGame();
</script>
</body>
</html>
