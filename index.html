<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>4x4 Shape Sudoku</title>
  <style>
    :root{
      --bg:#4d4d4d;
      --panel:#5b5b5b;
      --cell:#6a6a6a;
      --border:#8f8f8f;
      --text:#f3f3f3;
      --muted:#dddddd;
      --accent:#ffffff;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
      background:linear-gradient(180deg,#565656,#444);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }
    .wrap{
      width:min(760px,100%);
      background:var(--panel);
      border:2px solid var(--border);
      border-radius:18px;
      padding:20px;
      box-shadow:0 14px 36px rgba(0,0,0,.28);
    }
    .top{
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }
    .title{
      font-size:28px;
      font-weight:700;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .stats{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }
    .pill{
      background:var(--cell);
      border:1px solid var(--border);
      border-radius:999px;
      padding:8px 14px;
      font-size:14px;
    }
    .game{
      display:grid;
      grid-template-columns:1fr 180px;
      gap:18px;
      align-items:start;
    }
    .board{
      display:grid;
      grid-template-columns:repeat(4, 1fr);
      gap:0;
      border:3px solid var(--accent);
      border-radius:12px;
      overflow:hidden;
      background:#777;
      max-width:480px;
      aspect-ratio:1 / 1;
    }
    .cell{
      position:relative;
      border:1px solid var(--border);
      background:var(--cell);
      display:flex;
      align-items:center;
      justify-content:center;
      font-size:54px;
      cursor:pointer;
      user-select:none;
      transition:background .12s ease, transform .08s ease;
    }
    .cell:hover{ transform:scale(1.02); }
    .cell.fixed{
      background:#616161;
      cursor:default;
      font-weight:700;
    }
    .cell.selected{
      outline:3px solid rgba(255,255,255,.6);
      outline-offset:-3px;
    }
    .cell.invalid{
      background:#876565;
    }
    .cell.goodflash{
      background:#688168;
    }
    .r1{ border-bottom:3px solid var(--accent); }
    .c1{ border-right:3px solid var(--accent); }

    .side{
      display:grid;
      gap:14px;
    }
    .panel{
      background:#636363;
      border:1px solid var(--border);
      border-radius:12px;
      padding:14px;
    }
    .panel h3{
      margin:0 0 10px;
      font-size:16px;
      text-transform:uppercase;
      letter-spacing:.04em;
    }
    .picker{
      display:grid;
      grid-template-columns:repeat(2,1fr);
      gap:10px;
    }
    .shape-btn, button{
      border:none;
      border-radius:10px;
      background:#ededed;
      color:#333;
      font-weight:700;
      cursor:pointer;
    }
    .shape-btn{
      min-height:68px;
      font-size:40px;
    }
    button{
      padding:11px 14px;
      font-size:14px;
    }
    .shape-btn.active{
      outline:3px solid rgba(255,255,255,.75);
      background:#fff;
    }
    .status{
      line-height:1.45;
      color:var(--muted);
      min-height:44px;
      font-size:14px;
    }
    .legend{
      font-size:14px;
      line-height:1.5;
      color:var(--muted);
    }
    .bar-wrap{
      height:12px;
      background:#444;
      border:1px solid var(--border);
      border-radius:999px;
      overflow:hidden;
    }
    .bar{
      height:100%;
      width:100%;
      background:#f0f0f0;
      transform-origin:left center;
    }
    @media (max-width:720px){
      .game{ grid-template-columns:1fr; }
      .board{ max-width:none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <div class="title">4x4 Shape Sudoku</div>
      <div class="stats">
        <div class="pill">Time: <span id="time">35</span>s</div>
        <div class="pill">Filled: <span id="filled">0</span>/8</div>
      </div>
    </div>

    <div class="game">
      <div>
        <div class="board" id="board"></div>
      </div>

      <div class="side">
        <div class="panel">
          <h3>Shapes</h3>
          <div class="picker" id="picker"></div>
        </div>

        <div class="panel">
          <h3>Controls</h3>
          <div style="display:grid; gap:10px;">
            <button id="restartBtn">Start / Restart</button>
            <button id="clearBtn">Clear Selected Cell</button>
          </div>
        </div>

        <div class="panel">
          <h3>Status</h3>
          <div class="status" id="status">Pick a shape, then click an empty square.</div>
          <div class="bar-wrap" style="margin-top:10px;"><div class="bar" id="timeBar"></div></div>
        </div>

        <div class="panel">
          <h3>Rules</h3>
          <div class="legend">
            Every row, column, and 2x2 box must contain exactly one of each shape:
            ▲ ■ ● —
          </div>
        </div>
      </div>
    </div>
  </div>

<script>
(() => {
  const SHAPES = ["▲","■","●","—"];

  const START = [
    ["▲", null, null, "—"],
    [null, "—", "▲", null],
    ["—", null, null, "■"],
    [null, "■", "—", null]
  ];

  const SOLUTION = [
    ["▲","●","■","—"],
    ["■","—","▲","●"],
    ["—","▲","●","■"],
    ["●","■","—","▲"]
  ];

  const state = {
    board: [],
    selectedCell: null,
    selectedShape: "▲",
    timeLeft: 35,
    timer: null,
    running: false
  };

  const boardEl = document.getElementById("board");
  const pickerEl = document.getElementById("picker");
  const timeEl = document.getElementById("time");
  const filledEl = document.getElementById("filled");
  const statusEl = document.getElementById("status");
  const timeBarEl = document.getElementById("timeBar");
  const restartBtn = document.getElementById("restartBtn");
  const clearBtn = document.getElementById("clearBtn");

  function cloneBoard(src){ return src.map(row => [...row]); }

  function buildPicker(){
    pickerEl.innerHTML = "";
    SHAPES.forEach(shape => {
      const btn = document.createElement("button");
      btn.className = "shape-btn" + (shape === state.selectedShape ? " active" : "");
      btn.textContent = shape;
      btn.addEventListener("click", () => {
        state.selectedShape = shape;
        document.querySelectorAll(".shape-btn").forEach(x => x.classList.remove("active"));
        btn.classList.add("active");
        setStatus(`Selected ${shape}. Click an empty square.`);
      });
      pickerEl.appendChild(btn);
    });
  }

  function cellClass(r, c, fixed){
    let cls = "cell";
    if (fixed) cls += " fixed";
    if (r === 1) cls += " r1";
    if (c === 1) cls += " c1";
    return cls;
  }

  function buildBoard(){
    boardEl.innerHTML = "";
    for(let r=0; r<4; r++){
      for(let c=0; c<4; c++){
        const value = state.board[r][c];
        const fixed = START[r][c] !== null;
        const cell = document.createElement("button");
        cell.className = cellClass(r, c, fixed);
        cell.dataset.r = r;
        cell.dataset.c = c;
        cell.textContent = value || "";
        cell.addEventListener("click", () => onCellClick(r, c));
        boardEl.appendChild(cell);
      }
    }
    refreshValidation();
    updateHud();
  }

  function getCellEl(r, c){
    return boardEl.querySelector(`.cell[data-r="${r}"][data-c="${c}"]`);
  }

  function updateHud(){
    timeEl.textContent = state.timeLeft;
    timeBarEl.style.transform = `scaleX(${Math.max(0, state.timeLeft / 35)})`;
    let filled = 0;
    for(let r=0; r<4; r++){
      for(let c=0; c<4; c++){
        if(START[r][c] === null && state.board[r][c]) filled++;
      }
    }
    filledEl.textContent = filled;
  }

  function setStatus(text){
    statusEl.textContent = text;
  }

  function startGame(){
    clearInterval(state.timer);
    state.board = cloneBoard(START);
    state.selectedCell = null;
    state.selectedShape = "▲";
    state.timeLeft = 35;
    state.running = true;
    buildPicker();
    buildBoard();
    setStatus("Pick a shape, then click an empty square.");

    state.timer = setInterval(() => {
      if(!state.running) return;
      state.timeLeft--;
      updateHud();
      if(state.timeLeft <= 0){
        state.timeLeft = 0;
        updateHud();
        endGame(false);
      }
    }, 1000);
  }

  function endGame(win){
    clearInterval(state.timer);
    state.running = false;
    document.querySelectorAll(".cell").forEach(el => el.classList.remove("selected"));
    setStatus(win ? "You solved it in time." : "Time ran out.");
  }

  function onCellClick(r, c){
    if(!state.running) return;
    const fixed = START[r][c] !== null;
    if(fixed){
      setStatus("That square is fixed.");
      return;
    }

    document.querySelectorAll(".cell").forEach(el => el.classList.remove("selected"));
    const cell = getCellEl(r, c);
    cell.classList.add("selected");
    state.selectedCell = {r, c};

    state.board[r][c] = state.selectedShape;
    cell.textContent = state.selectedShape;
    refreshValidation();
    updateHud();

    if(isSolved()){
      flashGood();
      endGame(true);
    } else {
      setStatus(`Placed ${state.selectedShape}.`);
    }
  }

  function clearSelected(){
    if(!state.running || !state.selectedCell) return;
    const {r, c} = state.selectedCell;
    if(START[r][c] !== null) return;
    state.board[r][c] = null;
    getCellEl(r, c).textContent = "";
    refreshValidation();
    updateHud();
    setStatus("Cleared selected cell.");
  }

  function hasDupes(values){
    const seen = new Set();
    for(const v of values){
      if(!v) continue;
      if(seen.has(v)) return true;
      seen.add(v);
    }
    return false;
  }

  function refreshValidation(){
    document.querySelectorAll(".cell").forEach(el => el.classList.remove("invalid"));

    for(let r=0; r<4; r++){
      const row = state.board[r];
      if(hasDupes(row)){
        for(let c=0; c<4; c++) getCellEl(r,c).classList.add("invalid");
      }
    }

    for(let c=0; c<4; c++){
      const col = [state.board[0][c], state.board[1][c], state.board[2][c], state.board[3][c]];
      if(hasDupes(col)){
        for(let r=0; r<4; r++) getCellEl(r,c).classList.add("invalid");
      }
    }

    for(let br=0; br<4; br+=2){
      for(let bc=0; bc<4; bc+=2){
        const vals = [
          state.board[br][bc], state.board[br][bc+1],
          state.board[br+1][bc], state.board[br+1][bc+1]
        ];
        if(hasDupes(vals)){
          for(let r=br; r<br+2; r++){
            for(let c=bc; c<bc+2; c++) getCellEl(r,c).classList.add("invalid");
          }
        }
      }
    }
  }

  function isSolved(){
    for(let r=0; r<4; r++){
      for(let c=0; c<4; c++){
        if(state.board[r][c] !== SOLUTION[r][c]) return false;
      }
    }
    return true;
  }

  function flashGood(){
    document.querySelectorAll(".cell").forEach(el => {
      el.classList.add("goodflash");
      setTimeout(() => el.classList.remove("goodflash"), 350);
    });
  }

  restartBtn.addEventListener("click", startGame);
  clearBtn.addEventListener("click", clearSelected);

  startGame();
})();
</script>
</body>
</html>
