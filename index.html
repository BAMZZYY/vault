<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shape Sudoku</title>
<style>
body {
  background:#666;
  color:white;
  font-family:Arial;
  text-align:center;
}

.grid {
  display:grid;
  grid-template-columns:repeat(4,80px);
  gap:5px;
  justify-content:center;
  margin-top:20px;
}

.cell {
  width:80px;
  height:80px;
  background:#888;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:32px;
  border-radius:8px;
  cursor:pointer;
}

button {
  margin-top:15px;
  padding:10px 20px;
}
</style>
</head>
<body>

<h2>Shape Sudoku</h2>
<p>Click order: Circle → Line → Triangle → Square</p>

<div class="grid" id="grid"></div>

<button onclick="validate()">Validate</button>
<p id="result"></p>

<script>
const order = ["circle","line","triangle","square"];
const symbols = {
  circle:"●",
  line:"—",
  triangle:"▲",
  square:"■"
};

const grid = document.getElementById("grid");

// build grid
for(let i=0;i<16;i++){
  const cell = document.createElement("div");
  cell.className="cell";
  cell.dataset.index = -1;
  cell.dataset.shape = "";

  cell.onclick = ()=>{
    let idx = Number(cell.dataset.index);
    idx++;

    if(idx >= order.length){
      idx = -1;
      cell.textContent="";
      cell.dataset.shape="";
    } else {
      cell.textContent = symbols[order[idx]];
      cell.dataset.shape = order[idx];
    }

    cell.dataset.index = idx;
  };

  grid.appendChild(cell);
}

function getBoard(){
  const cells = document.querySelectorAll(".cell");
  let board=[];
  for(let r=0;r<4;r++){
    board[r]=[];
    for(let c=0;c<4;c++){
      board[r][c]=cells[r*4+c].dataset.shape || "";
    }
  }
  return board;
}

function valid(arr){
  return arr.length===4 && !arr.includes("") && new Set(arr).size===4;
}

function validate(){
  const b = getBoard();

  for(let r=0;r<4;r++){
    if(!valid(b[r])) return show("Invalid ❌");
  }

  for(let c=0;c<4;c++){
    let col=[b[0][c],b[1][c],b[2][c],b[3][c]];
    if(!valid(col)) return show("Invalid ❌");
  }

  for(let r=0;r<4;r+=2){
    for(let c=0;c<4;c+=2){
      let box=[b[r][c],b[r][c+1],b[r+1][c],b[r+1][c+1]];
      if(!valid(box)) return show("Invalid ❌");
    }
  }

  show("Valid Solution ✅");
}

function show(msg){
  document.getElementById("result").innerText=msg;
}
</script>

</body>
</html>
